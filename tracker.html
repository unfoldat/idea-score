<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unfold 개발 트래커</title>
<style>
:root{
  --ink:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --done:#10b981;--active:#4f46e5;--pending:#d1d5db;
  --done-bg:#ecfdf5;--active-bg:#eef2ff;--pending-bg:#f9fafb;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#fafafa;color:var(--ink);padding:2rem;font-size:14px}

h1{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;
  color:var(--muted);margin-bottom:1.5rem}

/* 전체 진행률 */
.progress-wrap{margin-bottom:2rem}
.progress-label{display:flex;justify-content:space-between;margin-bottom:.4rem;
  font-size:.75rem;color:var(--muted)}
.progress-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--active);border-radius:99px;transition:width .4s}

/* 파이프라인 */
.pipeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:.5rem}

.step-wrap{display:flex;align-items:flex-start;flex:1;min-width:120px}

.connector{flex:1;height:2px;margin-top:1.1rem;
  background:var(--pending);transition:background .3s}
.connector.done{background:var(--done)}
.connector.active{background:linear-gradient(90deg,var(--done),var(--active))}

.step{display:flex;flex-direction:column;align-items:center;gap:.4rem;
  flex-shrink:0;width:90px;cursor:default}

.circle{width:2.2rem;height:2.2rem;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:.75rem;font-weight:700;
  border:2px solid var(--pending);background:#fff;position:relative;
  transition:all .2s}
.step.done  .circle{background:var(--done);  border-color:var(--done);  color:#fff}
.step.active .circle{background:var(--active);border-color:var(--active);color:#fff;
  box-shadow:0 0 0 4px rgba(79,70,229,.15)}
.step.pending .circle{color:var(--muted)}

/* 도미노 펄스 */
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.35)}
                 50%{box-shadow:0 0 0 7px rgba(79,70,229,0)}}
.step.active .circle{animation:pulse 1.8s infinite}

.step-id{font-size:.58rem;font-weight:700;letter-spacing:.06em;color:var(--muted)}
.step-name{font-size:.68rem;font-weight:600;text-align:center;line-height:1.3}
.step.done   .step-name{color:var(--done)}
.step.active .step-name{color:var(--active)}
.step.pending .step-name{color:var(--muted)}
.step-metric{font-size:.6rem;color:var(--muted);text-align:center;line-height:1.3}

/* 현재 상태 카드 */
.status-card{margin-top:2rem;padding:1rem 1.2rem;border-radius:10px;
  background:var(--active-bg);border:1px solid #c7d2fe}
.status-card h2{font-size:.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--active);margin-bottom:.5rem}
.status-card .current-name{font-size:1rem;font-weight:700;color:var(--ink)}
.status-card .current-metric{font-size:.8rem;color:var(--muted);margin-top:.2rem}
.status-card .baseline{font-size:.72rem;color:#6366f1;margin-top:.6rem;
  padding:.3rem .6rem;background:#fff;border-radius:6px;display:inline-block}

/* 측정 이력 */
.history{margin-top:1.5rem}
.history h2{font-size:.65rem;font-weight:700;letter-spacing:.1em;
  text-transform:uppercase;color:var(--muted);margin-bottom:.6rem}
.history-row{display:flex;gap:.75rem;align-items:baseline;
  font-size:.75rem;padding:.25rem 0;border-bottom:1px solid var(--border)}
.history-date{color:var(--muted);flex-shrink:0;width:6rem}
.history-val{font-weight:700;color:var(--ink);width:5rem}
.history-note{color:var(--muted)}

.updated{font-size:.6rem;color:var(--muted);margin-top:1.5rem;text-align:right}
</style>
</head>
<body>

<h1>Unfold AT — 개발 트래커</h1>

<!-- ═══════════════════════════════════════════════════
     에이전트가 수정하는 유일한 데이터 블록.
     status: "done" | "active" | "pending"
     ═══════════════════════════════════════════════════ -->
<script>
const DATA = {
  updated: "2026-05-25",
  steps: [
    { id:"ST-1-1", name:"블록 병합",      status:"active",  metric:"sorry 707 → 200" },
    { id:"ST-1-2", name:"문서유형 감지",   status:"pending", metric:"arXiv / IEEE 구분" },
    { id:"ST-1-3", name:"BPL 직렬화",     status:"pending", metric:"episode.json 생성" },
    { id:"ST-2-1", name:"엔드투엔드",     status:"pending", metric:"PDF → HTML 출력" },
    { id:"ST-2-2", name:"자율 트리거",    status:"pending", metric:"사람 없이 자동 실행" },
  ],
  history: [
    { date:"2026-05-25", val:"1663", note:"초기 (verifier 도입)" },
    { date:"2026-05-25", val:" 707", note:"features.py + equation 감지 + R06 면제" },
  ],
  baseline_label: "현행수준: sorry_count = 707",
};
</script>
<!-- ═══════════════════════════════════════════════════ -->

<script>
(function(){
  const steps = DATA.steps;
  const done  = steps.filter(s=>s.status==="done").length;
  const pct   = Math.round(done / steps.length * 100);
  const active= steps.find(s=>s.status==="active") || steps[0];

  // 진행률 바
  document.write(`
  <div class="progress-wrap">
    <div class="progress-label">
      <span>전체 진행률</span>
      <span>${done} / ${steps.length} 완료 (${pct}%)</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${pct}%"></div>
    </div>
  </div>`);

  // 파이프라인
  let html = '<div class="pipeline">';
  steps.forEach((s, i) => {
    const prevDone = i === 0 || steps[i-1].status === "done";
    const connClass = i===0 ? '' :
      (steps[i-1].status==="done" ? "done" :
       steps[i-1].status==="active" ? "active" : "");
    const icon = s.status==="done" ? "✓" : s.status==="active" ? "▶" : (i+1);

    if(i>0) html += `<div class="connector ${connClass}"></div>`;
    html += `
    <div class="step ${s.status}">
      <div class="circle">${icon}</div>
      <span class="step-id">${s.id}</span>
      <span class="step-name">${s.name}</span>
      <span class="step-metric">${s.metric}</span>
    </div>`;
  });
  html += '</div>';
  document.write(html);

  // 현재 상태 카드
  document.write(`
  <div class="status-card">
    <h2>현재 진행 중</h2>
    <div class="current-name">${active.name}</div>
    <div class="current-metric">${active.metric}</div>
    <div class="baseline">${DATA.baseline_label}</div>
  </div>`);

  // 측정 이력
  let hist = '<div class="history"><h2>sorry_count 이력</h2>';
  DATA.history.forEach(h => {
    hist += `<div class="history-row">
      <span class="history-date">${h.date}</span>
      <span class="history-val">${h.val}</span>
      <span class="history-note">${h.note}</span>
    </div>`;
  });
  hist += '</div>';
  document.write(hist);

  document.write(`<div class="updated">마지막 업데이트: ${DATA.updated}</div>`);
})();
</script>

</body>
</html>
