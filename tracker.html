<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Unfold 개발 트래커</title>
<style>
:root{
  --ink:#1a1a2e;--muted:#6b7280;--border:#e5e7eb;
  --done:#10b981;--active:#4f46e5;--pending:#d1d5db;
  --warn:#f59e0b;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
  background:#fafafa;color:var(--ink);padding:2rem;font-size:14px;max-width:780px}

.toolbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:1.5rem}
h1{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted)}
.clock{font-size:.7rem;color:var(--muted);font-variant-numeric:tabular-nums}

/* 진행률 */
.progress-wrap{margin-bottom:1.8rem}
.progress-label{display:flex;justify-content:space-between;margin-bottom:.4rem;font-size:.72rem;color:var(--muted)}
.progress-bar{height:5px;background:var(--border);border-radius:99px;overflow:hidden}
.progress-fill{height:100%;background:var(--active);border-radius:99px;transition:width .5s}

/* 파이프라인 */
.pipeline{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:.5rem;margin-bottom:1.8rem}
.step-wrap{display:flex;align-items:center;flex:1;min-width:0}
.connector{flex:1;height:2px;margin-bottom:1.6rem;background:var(--pending);min-width:8px}
.connector.done{background:var(--done)}
.connector.active{background:linear-gradient(90deg,var(--done),var(--active))}
.step{display:flex;flex-direction:column;align-items:center;gap:.3rem;flex-shrink:0;width:80px}
.circle{width:2rem;height:2rem;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:.72rem;font-weight:700;border:2px solid var(--pending);background:#fff;transition:all .2s}
.step.done   .circle{background:var(--done);border-color:var(--done);color:#fff}
.step.active .circle{background:var(--active);border-color:var(--active);color:#fff;
  animation:pulse 1.8s infinite}
.step.pending .circle{color:var(--muted)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(79,70,229,.35)}50%{box-shadow:0 0 0 6px rgba(79,70,229,0)}}
.step-id{font-size:.55rem;font-weight:700;letter-spacing:.05em;color:var(--muted)}
.step-name{font-size:.65rem;font-weight:600;text-align:center;line-height:1.3}
.step.done   .step-name{color:var(--done)}
.step.active .step-name{color:var(--active)}
.step.pending .step-name{color:var(--muted)}

/* 현재 작업 카드 */
.active-card{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;
  padding:1rem 1.2rem;margin-bottom:1.5rem}
.active-card-header{display:flex;align-items:baseline;gap:.6rem;margin-bottom:.8rem}
.active-label{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--active);background:#c7d2fe;padding:.15rem .45rem;border-radius:4px}
.active-title{font-size:.95rem;font-weight:700;color:var(--ink)}
.active-meta{font-size:.72rem;color:#6366f1;margin-left:auto;font-variant-numeric:tabular-nums}

/* 서브태스크 체크리스트 */
.subtasks{display:flex;flex-direction:column;gap:.35rem}
.subtask{display:flex;align-items:flex-start;gap:.5rem;font-size:.75rem;padding:.3rem .5rem;
  border-radius:6px}
.subtask.done   {background:#ecfdf5;color:#065f46}
.subtask.active {background:#fff;border:1px solid #c7d2fe;color:var(--ink)}
.subtask.pending{color:var(--muted)}
.subtask-icon{font-size:.7rem;flex-shrink:0;margin-top:.05rem;width:1rem;text-align:center}
.subtask.done    .subtask-icon{color:var(--done)}
.subtask.active  .subtask-icon{color:var(--active)}
.subtask.pending .subtask-icon{color:var(--pending)}
.subtask-time{font-size:.65rem;color:var(--muted);margin-left:auto;flex-shrink:0;font-variant-numeric:tabular-nums}

/* 측정 이력 */
.history{margin-top:.5rem}
.history h2{font-size:.62rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.5rem}
.history-row{display:grid;grid-template-columns:9rem 5rem 1fr;gap:.5rem;align-items:baseline;
  font-size:.72rem;padding:.22rem 0;border-bottom:1px solid var(--border)}
.h-date{color:var(--muted);font-variant-numeric:tabular-nums}
.h-val{font-weight:700}
.h-val.down{color:var(--done)}
.h-val.up  {color:#ef4444}
.h-val.base{color:var(--muted)}
.h-note{color:var(--muted)}

.footer{font-size:.6rem;color:var(--muted);margin-top:1.2rem;
  display:flex;justify-content:space-between}
</style>
</head>
<body>

<div class="toolbar">
  <h1>Unfold AT — 개발 트래커</h1>
  <span class="clock" id="clock"></span>
</div>

<!-- ═══════════════════════════════════════════════════
     에이전트 수정 구역 — 이 DATA 객체만 업데이트
     status: "done" | "active" | "pending"
     subtask status: "done" | "active" | "pending"
     ═══════════════════════════════════════════════════ -->
<script>
const DATA = {
  updated: "2026-05-25 21:10",
  steps: [
    {
      id:"ST-1-1", name:"블록 병합", status:"done",
      metric:"sorry 707 → 4",
      started: "2026-05-25 18:42",
      subtasks: [
        { text:"_merge_fragmented_blocks() 설계", status:"done", time:"18:42" },
        { text:"병합 조건: 인접 x좌표 + word_count ≤ 3",  status:"done", time:"19:15" },
        { text:"R01/R06 규칙 정밀화 (no-h1 skip, short exempt)", status:"done", time:"20:40" },
        { text:"테스트: sorry_count = 4 ✓",               status:"done", time:"21:10" },
      ]
    },
    {
      id:"ST-1-2", name:"독자행동 감지", status:"active",
      metric:"찾기/따라/판단/이해/실행",
      subtasks: [
        { text:"섹션별 독자 행동 유형 분류기 설계",  status:"pending", time:"" },
        { text:"행동 유형 → HTML 구조 매핑 테이블", status:"pending", time:"" },
        { text:"classify()에 reader_action 필드 추가", status:"pending", time:"" },
      ]
    },
    {
      id:"ST-1-3", name:"BPL 직렬화", status:"pending",
      metric:"episode.json 생성",
      subtasks: [
        { text:"FailureReport.to_dict() 구현",    status:"pending", time:"" },
        { text:"episode.json 자동 저장",           status:"pending", time:"" },
        { text:"docking-station/log/ 연동",        status:"pending", time:"" },
      ]
    },
    {
      id:"ST-2-1", name:"엔드투엔드", status:"pending",
      metric:"PDF → HTML 출력",
      subtasks: [
        { text:"detector → features 파이프 연결",  status:"pending", time:"" },
        { text:"HTML 출력 렌더러 구현",            status:"pending", time:"" },
        { text:"테스트 PDF 10개 검증",             status:"pending", time:"" },
      ]
    },
    {
      id:"ST-2-2", name:"자율 트리거", status:"pending",
      metric:"사람 없이 자동 실행",
      subtasks: [
        { text:"새 PDF 감지 (watchdog)",          status:"pending", time:"" },
        { text:"IEP 숙달기준 자동 체크",           status:"pending", time:"" },
        { text:"결과 log/ 자동 저장",              status:"pending", time:"" },
      ]
    },
  ],
  history: [
    { date:"2026-05-25 17:20", val:1663, note:"초기 — verifier R01-R06 도입" },
    { date:"2026-05-25 18:10", val: 707, note:"features.py + equation 감지 + R06 code 면제" },
    { date:"2026-05-25 19:15", val: 395, note:"_merge_fragmented_blocks() — PDF 파편 병합" },
    { date:"2026-05-25 20:40", val: 301, note:"H2_SIZE word_count≤12, R06 numeric 면제" },
    { date:"2026-05-25 21:10", val:   4, note:"R01 no-h1 doc skip + R06 short text(<30) 면제" },
  ],
};
</script>
<!-- ═══════════════════════════════════════════════════ -->

<script>
(function(){
  const steps = DATA.steps;
  const doneCount = steps.filter(s=>s.status==="done").length;
  const pct = Math.round(doneCount / steps.length * 100);
  const activeStep = steps.find(s=>s.status==="active") || steps[0];

  // 실시간 시계
  function tick(){
    const n=new Date();
    const pad=x=>String(x).padStart(2,'0');
    document.getElementById('clock').textContent =
      `${n.getFullYear()}-${pad(n.getMonth()+1)}-${pad(n.getDate())} `+
      `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
  }
  tick(); setInterval(tick,1000);

  // 진행률
  document.write(`
  <div class="progress-wrap">
    <div class="progress-label">
      <span>전체 진행률</span>
      <span>${doneCount} / ${steps.length} 완료 &nbsp;·&nbsp; ${pct}%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" style="width:${Math.max(pct,2)}%"></div>
    </div>
  </div>`);

  // 파이프라인
  let pipe = '<div class="pipeline">';
  steps.forEach((s,i)=>{
    const connClass = i===0 ? '' :
      steps[i-1].status==="done" ? "done" :
      steps[i-1].status==="active" ? "active" : "";
    const icon = s.status==="done" ? "✓" : s.status==="active" ? "▶" : (i+1);
    if(i>0) pipe += `<div class="connector ${connClass}"></div>`;
    pipe += `
    <div class="step ${s.status}">
      <div class="circle">${icon}</div>
      <span class="step-id">${s.id}</span>
      <span class="step-name">${s.name}</span>
    </div>`;
  });
  pipe += '</div>';
  document.write(pipe);

  // 현재 작업 카드
  const elapsed = activeStep.started ? (() => {
    const start = new Date(activeStep.started.replace(' ','T'));
    const diff = Math.floor((Date.now()-start)/60000);
    return diff < 60 ? `${diff}분 진행 중` : `${Math.floor(diff/60)}시간 ${diff%60}분 진행 중`;
  })() : '';

  let card = `
  <div class="active-card">
    <div class="active-card-header">
      <span class="active-label">진행 중</span>
      <span class="active-title">${activeStep.id} · ${activeStep.name}</span>
      <span class="active-meta">${elapsed}</span>
    </div>
    <div class="subtasks">`;

  activeStep.subtasks.forEach(t=>{
    const icon = t.status==="done" ? "✓" : t.status==="active" ? "▶" : "○";
    card += `
    <div class="subtask ${t.status}">
      <span class="subtask-icon">${icon}</span>
      <span>${t.text}</span>
      ${t.time ? `<span class="subtask-time">${t.time}</span>` : ''}
    </div>`;
  });
  card += '</div></div>';
  document.write(card);

  // 측정 이력
  let hist = '<div class="history"><h2>sorry_count 측정 이력</h2>';
  DATA.history.forEach((h,i)=>{
    const prev = DATA.history[i-1];
    const cls = i===0 ? "base" : h.val < prev.val ? "down" : "up";
    const arrow = i===0 ? "" : h.val < prev.val ? ` ↓${prev.val-h.val}` : ` ↑${h.val-prev.val}`;
    hist += `<div class="history-row">
      <span class="h-date">${h.date}</span>
      <span class="h-val ${cls}">${h.val}${arrow}</span>
      <span class="h-note">${h.note}</span>
    </div>`;
  });
  hist += '</div>';
  document.write(hist);

  document.write(`
  <div class="footer">
    <span>기초선: sorry_count = 1663 · 목표: 0</span>
    <span>마지막 업데이트: ${DATA.updated}</span>
  </div>`);
})();
</script>
</body>
</html>
