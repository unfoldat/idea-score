<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>아이디어 악보</title>
<style>
:root {
  --ink:#1a1a2e; --muted:#6b7280; --border:#e5e7eb;
  --skill-bg:#eef2ff; --skill-fg:#4f46e5;
  --writing-bg:#fffbeb;
  --c-full:#1a3a5c; --c-half:#f59e0b; --c-deceptive:#ef4444; --c-open:#10b981;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR','Malgun Gothic',sans-serif;
  background:#fafafa;color:var(--ink);font-size:14px;line-height:1.6;padding:2rem}

/* ── 상단 툴바 ── */
.toolbar{display:flex;align-items:center;gap:.75rem;margin-bottom:1.5rem;flex-wrap:wrap}
.toolbar h1{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-right:auto}
.btn{padding:.35rem .8rem;border-radius:6px;border:1px solid var(--border);
  background:#fff;font-size:.75rem;cursor:pointer;color:var(--ink);transition:background .12s}
.btn:hover{background:var(--border)}
.btn-primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn-primary:hover{background:#2d3a5c}
.btn-ghost{border-color:transparent;color:var(--muted)}
.btn-ghost:hover{background:var(--border)}

/* ── 악보 테이블 ── */
.score{width:100%;border-collapse:collapse}
.score thead th{
  font-size:.65rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);border-bottom:2px solid var(--ink);padding:.4rem .75rem .4rem 0;text-align:left}
.col-q{width:28%}
.col-skill{width:12%}.col-idea{width:36%}.col-write{width:24%}

/* 질문 셀 — 어노테이션 존(0~1.6rem) / 텍스트 존(1.6rem~) */
.q-cell{vertical-align:top;padding:.8rem .5rem .8rem 1.6rem;position:relative}
.q-cell::before{content:'';position:absolute;left:1.25rem;top:.6rem;bottom:.6rem;
  width:2px;background:var(--ink);border-radius:2px;opacity:.6}
.q-cell::after{content:'';position:absolute;left:1.25rem;top:.6rem;
  width:.4rem;height:2px;background:var(--ink);border-radius:2px;opacity:.6}

/* 리허설 마크 */
.rehearsal{position:absolute;left:.1rem;top:.75rem;width:1rem;height:1rem;
  border:2px solid var(--ink);border-radius:3px;display:flex;align-items:center;
  justify-content:center;font-size:.58rem;font-weight:900;background:#fff}

/* 세뇨 */
.segno-ref{font-size:.6rem;color:var(--muted);margin-top:.25rem;display:block}

/* 질문 텍스트 */
.q-text{display:block;font-size:.82rem;font-weight:600;line-height:1.45;
  min-height:1.2rem;outline:none}
.q-text:focus,.editable:focus{background:#f0f9ff;border-radius:3px;outline:2px solid #bfdbfe}
.editable{outline:none;min-height:1.2rem;display:block}

/* 데이터 셀 */
.score td{vertical-align:top;padding:.55rem .75rem .55rem 0;border-bottom:1px solid var(--border)}
.score tbody tr:first-child td{padding-top:.8rem}

/* 행 삭제 버튼 */
.del-row{opacity:0;background:none;border:none;cursor:pointer;color:#ef4444;
  font-size:.8rem;padding:0 .3rem;line-height:1}
tr:hover .del-row{opacity:.5}
.del-row:hover{opacity:1!important}

/* 스킬 태그 */
.skill-wrap{display:flex;flex-wrap:wrap;gap:.2rem;align-items:flex-start}
.skill{display:inline-block;background:var(--skill-bg);color:var(--skill-fg);
  font-size:.72rem;font-weight:700;padding:.15rem .4rem;border-radius:4px;white-space:nowrap}

/* 아이디어 */
.idea-list{list-style:none}
.idea-item{display:flex;align-items:baseline;gap:.4rem;margin-bottom:.2rem;font-size:.83rem}
.idea-item::before{content:'○';font-size:.55rem;color:var(--muted);flex-shrink:0;margin-top:.2rem}

/* 글감 */
.writing{font-size:.8rem;color:#92400e;background:var(--writing-bg);
  border-left:2px solid #f59e0b;padding:.18rem .5rem;border-radius:0 4px 4px 0;
  margin-bottom:.2rem;display:block}
.writing::before{content:'"'}.writing::after{content:'"'}

/* ── 종지 행 ── */
.cadence-row td{padding:.25rem 0 1rem .5rem;border-bottom:none}
.cadence-btn{display:inline-flex;align-items:center;gap:.4rem;font-size:.72rem;font-weight:700;
  padding:.2rem .7rem;border-radius:99px;cursor:pointer;transition:all .15s;background:#fff}
.cadence-btn .sym{font-size:.95rem;font-weight:900}
.cadence-btn[data-c="full"]      {color:var(--c-full);      border:1.5px solid var(--c-full)}
.cadence-btn[data-c="half"]      {color:var(--c-half);      border:1.5px solid var(--c-half)}
.cadence-btn[data-c="deceptive"] {color:var(--c-deceptive); border:1.5px solid var(--c-deceptive)}
.cadence-btn[data-c="open"]      {color:var(--c-open);      border:1.5px solid var(--c-open)}
.cadence-btn:hover{opacity:.75}

.double-bar{display:inline-block;width:.6rem;height:1rem;border-left:1px solid var(--muted);
  border-right:3px solid var(--muted);margin-left:.6rem;vertical-align:middle;opacity:.3}

/* 질문 그룹 삭제 버튼 */
.del-group-wrap{text-align:right;padding:.2rem .5rem}
.del-group{opacity:0;background:none;border:none;cursor:pointer;color:#ef4444;
  font-size:.72rem;padding:.2rem .5rem}
tbody:hover .del-group{opacity:.4}
.del-group:hover{opacity:1!important}

/* 빈 셀 플레이스홀더 */
[contenteditable]:empty:before{content:attr(data-ph);color:#d1d5db;pointer-events:none}

/* 추가 버튼 행 */
.add-row-cell{padding:.3rem 0 .3rem 2.4rem!important;border-bottom:none}
.add-row-btn{background:none;border:none;cursor:pointer;color:var(--muted);
  font-size:.72rem;padding:.2rem .4rem;border-radius:4px}
.add-row-btn:hover{background:var(--border);color:var(--ink)}

/* 범례 */
.legend{margin-top:2.5rem;padding-top:1rem;border-top:1px solid var(--border);
  display:flex;gap:1.2rem;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:.3rem;font-size:.68rem;color:var(--muted)}

/* 저장 상태 표시 */
.save-status{font-size:.7rem;color:var(--muted)}

/* ── 학술 타임라인 뷰 ── */
#academic-view{display:none;max-width:860px}
.acad-timeline{position:relative;padding-left:3.2rem}
.acad-timeline::before{content:'';position:absolute;left:1rem;top:.4rem;bottom:0;
  width:2px;background:var(--border)}
.acad-entry{position:relative;margin-bottom:2.2rem}
.acad-dot{position:absolute;left:-2.35rem;top:1rem;width:.7rem;height:.7rem;
  border-radius:50%;background:var(--ink);border:2px solid #fafafa;
  box-shadow:0 0 0 2px var(--ink)}
.acad-era{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--muted);
  text-transform:uppercase;margin-bottom:.25rem}
.acad-q{font-size:.88rem;font-weight:700;color:var(--ink);line-height:1.45;
  margin-bottom:.35rem}
.acad-segno{font-size:.66rem;color:var(--muted);margin-bottom:.55rem;
  display:flex;align-items:center;gap:.3rem}
.acad-segno::before{content:'𝄋';font-size:.75rem}
.acad-grid{display:grid;grid-template-columns:1fr 2fr 1.8fr;gap:.35rem;margin-bottom:.45rem}
.acad-cell{border-radius:5px;padding:.35rem .55rem}
.acad-lbl{font-size:.56rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.18rem}
.acad-val{font-size:.78rem;line-height:1.4;white-space:pre-line}
.acad-skill{background:var(--skill-bg)}
.acad-skill .acad-val{color:var(--skill-fg)}
.acad-idea{background:#f0fdf4}
.acad-idea .acad-val{color:#166534}
.acad-writing{background:var(--writing-bg)}
.acad-writing .acad-val{color:#92400e}
/* 용어 뱃지 */
.term{display:inline-block;background:#fff;border:1px solid #e5e7eb;
  border-radius:4px;padding:.05rem .32rem;font-size:.72rem;margin:.05rem .1rem 0 0;
  font-weight:600;color:var(--ink)}
/* 종지 */
.acad-cadence{display:inline-flex;align-items:center;gap:.3rem;
  font-size:.7rem;font-weight:700;margin-top:.1rem}
.acad-cadence[data-c="full"]{color:var(--c-full)}
.acad-cadence[data-c="half"]{color:var(--c-half)}
.acad-cadence[data-c="deceptive"]{color:var(--c-deceptive)}
.acad-cadence[data-c="open"]{color:var(--c-open)}
.acad-note-wrap{margin-top:.45rem}
.acad-note{width:100%;font-size:.78rem;font-family:inherit;border:1px dashed var(--border);
  border-radius:4px;padding:.3rem .5rem;resize:vertical;min-height:2rem;
  background:#fafafa;color:var(--ink);outline:none}
.acad-note:focus{border-color:#bfdbfe;background:#f0f9ff}
.acad-note-lbl{font-size:.6rem;color:var(--muted);margin-bottom:.15rem}

/* ── 날짜 / 달력 뷰 ── */
/* 악보 뷰의 날짜 표시 (종지 행 오른쪽) */
.entry-date{float:right;font-size:.6rem;color:var(--muted);
  font-variant-numeric:tabular-nums;opacity:.55;margin-top:.18rem}

/* 뷰 토글 버튼 */
.view-btn{font-size:.72rem;padding:.25rem .6rem}
.view-btn.active{background:var(--ink);color:#fff;border-color:var(--ink)}

/* 달력(타임라인) 뷰 */
#cal-view{display:none}
.cal-day{margin-bottom:2.2rem}
.cal-day-header{
  font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
  border-bottom:2px solid var(--ink);padding-bottom:.3rem;margin-bottom:.65rem;
  display:flex;align-items:baseline;gap:.5rem}
.cal-day-header time{font-size:.8rem;color:var(--ink);font-style:normal;
  font-variant-numeric:tabular-nums}
.cal-day-header .day-count{font-size:.62rem;color:var(--muted);font-weight:400}
.cal-entry{display:flex;align-items:baseline;gap:.5rem;
  margin-bottom:.4rem;padding:.25rem .3rem;border-radius:4px}
.cal-entry:hover{background:#f3f4f6}
.cal-mark{width:1.2rem;height:1.2rem;border:2px solid var(--ink);border-radius:3px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:.58rem;font-weight:900;flex-shrink:0;background:#fff}
.cal-q{flex:1;font-size:.82rem;font-weight:600;color:var(--ink)}
.cal-sym{font-size:.82rem;font-weight:900;flex-shrink:0}
.cal-sym[data-c="full"]      {color:var(--c-full)}
.cal-sym[data-c="half"]      {color:var(--c-half)}
.cal-sym[data-c="deceptive"] {color:var(--c-deceptive)}
.cal-sym[data-c="open"]      {color:var(--c-open)}
/* 달력 뷰일 때 악보 숨김 */
body.cal-mode #score-table,body.cal-mode #add-q-btn{display:none}
body.cal-mode #cal-view{display:block}
</style>
</head>
<body>

<div class="toolbar">
  <h1>아이디어 악보 · Idea Score</h1>
  <button class="btn view-btn active" id="btn-score"  onclick="setView('score')">악보</button>
  <button class="btn view-btn"        id="btn-cal"    onclick="setView('cal')">날짜별</button>
  <button class="btn view-btn"        id="btn-acad"   onclick="setView('acad')">학술계보</button>
  <span class="save-status" id="save-status"></span>
  <button class="btn btn-ghost" onclick="loadExample()">예시 보기</button>
  <button class="btn btn-ghost" onclick="clearAll()">비우기</button>
  <button class="btn btn-primary" onclick="exportHTML()">내보내기 ↓</button>
</div>

<table class="score" id="score-table">
<thead>
  <tr>
    <th class="col-q"    scope="col">질문</th>
    <th class="col-skill" scope="col">스킬</th>
    <th class="col-idea"  scope="col">아이디어</th>
    <th class="col-write" scope="col">글감</th>
  </tr>
</thead>
</table>
<div id="cal-view"></div>
<div id="academic-view"></div>

<button class="btn" id="add-q-btn" style="margin-top:1rem" onclick="addQuestion()">+ 질문 추가</button>

<!-- 범례 -->
<div class="legend">
  <span class="legend-item"><span class="cadence-btn" data-c="full"  style="pointer-events:none;padding:.08rem .35rem"><span class="sym">‖</span></span>완전종지 — 완전히 답됨</span>
  <span class="legend-item"><span class="cadence-btn" data-c="half"  style="pointer-events:none;padding:.08rem .35rem"><span class="sym">↑</span></span>반종지 — 다음으로 이어짐</span>
  <span class="legend-item"><span class="cadence-btn" data-c="deceptive" style="pointer-events:none;padding:.08rem .35rem"><span class="sym">?→</span></span>변격종지 — 예상 밖 전환</span>
  <span class="legend-item"><span class="cadence-btn" data-c="open"  style="pointer-events:none;padding:.08rem .35rem"><span class="sym">→</span></span>진행 중</span>
  <span class="legend-item" style="margin-left:.5rem">[ ] 리허설 마크 &nbsp;·&nbsp; 𝄋 세뇨(이전 참조)</span>
</div>

<script>
// ── 종지 순환 ──────────────────────────────────────────────
const CADENCES = [
  { key:'open',       sym:'→',  label:'진행 중' },
  { key:'full',       sym:'‖',  label:'완전종지' },
  { key:'half',       sym:'↑',  label:'반종지' },
  { key:'deceptive',  sym:'?→', label:'변격종지' },
];
function nextCadence(btn) {
  const keys = CADENCES.map(c=>c.key);
  const cur  = btn.dataset.c;
  const next = CADENCES[(keys.indexOf(cur)+1) % CADENCES.length];
  btn.dataset.c = next.key;
  btn.querySelector('.sym').textContent = next.sym;
  btn.querySelector('.lbl').textContent = ' ' + next.label;
  save();
}

// ── 리허설 마크 갱신 ────────────────────────────────────────
function refreshMarks() {
  document.querySelectorAll('.rehearsal').forEach((el, i) => {
    el.textContent = String.fromCharCode(65 + i);
  });
}

// ── 행 추가 ──────────────────────────────────────────────────
function addRow(tbody) {
  const addRowTr = tbody.querySelector('.add-row-tr');
  const tr = document.createElement('tr');
  tr.innerHTML = `
    <td></td>
    <td><div class="editable" contenteditable="true" data-ph="스킬"></div></td>
    <td><div class="editable" contenteditable="true" data-ph="아이디어"></div></td>
    <td>
      <div style="display:flex;align-items:flex-start;gap:.3rem">
        <div class="editable" contenteditable="true" data-ph="글감" style="flex:1"></div>
        <button class="del-row" title="행 삭제" onclick="this.closest('tr').remove();save()">✕</button>
      </div>
    </td>`;
  tbody.insertBefore(tr, addRowTr);
  tr.querySelectorAll('[contenteditable]')[0].focus();
  save();
}

// ── 질문 추가 ────────────────────────────────────────────────
let qCount = 0;
function addQuestion(data) {
  qCount++;
  const table = document.getElementById('score-table');
  const tbody = document.createElement('tbody');
  const d = data || {};
  const cadence = d.cadence || CADENCES[0];
  const today = new Date().toISOString().slice(0,10);
  const date = d.date || today;
  tbody.dataset.date = date;

  tbody.innerHTML = `
  <tr>
    <td class="q-cell" rowspan="100">
      <span class="rehearsal"></span>
      <span class="q-text" contenteditable="true" data-ph="질문을 입력하세요">${d.q||''}</span>
      <span class="segno-ref" contenteditable="true" data-ph="𝄋 참조 (선택)"></span>
    </td>
    <td><div class="editable" contenteditable="true" data-ph="스킬">${(d.rows&&d.rows[0])?d.rows[0].skill:''}</div></td>
    <td><div class="editable" contenteditable="true" data-ph="아이디어">${(d.rows&&d.rows[0])?d.rows[0].idea:''}</div></td>
    <td>
      <div style="display:flex;align-items:flex-start;gap:.3rem">
        <div class="editable" contenteditable="true" data-ph="글감" style="flex:1">${(d.rows&&d.rows[0])?d.rows[0].writing:''}</div>
        <button class="del-row" title="행 삭제" onclick="this.closest('tr').remove();save()">✕</button>
      </div>
    </td>
  </tr>
  <tr class="add-row-tr">
    <td class="add-row-cell" colspan="3">
      <button class="add-row-btn" onclick="addRow(this.closest('tbody'))">+ 행 추가</button>
    </td>
  </tr>
  <tr class="cadence-row">
    <td colspan="3">
      <button class="cadence-btn" data-c="${cadence.key}" onclick="nextCadence(this)">
        <span class="sym">${cadence.sym}</span><span class="lbl"> ${cadence.label}</span>
      </button>
      <span class="double-bar"></span>
      <button class="del-group btn btn-ghost" style="font-size:.68rem;margin-left:.5rem"
        onclick="this.closest('tbody').remove();refreshMarks();save()">그룹 삭제</button>
      <time class="entry-date" datetime="${date}">${date}</time>
    </td>
  </tr>`;

  // 추가 데이터 행
  if (d.rows && d.rows.length > 1) {
    const addRowTr = tbody.querySelector('.add-row-tr');
    d.rows.slice(1).forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td></td>
        <td><div class="editable" contenteditable="true" data-ph="스킬">${r.skill||''}</div></td>
        <td><div class="editable" contenteditable="true" data-ph="아이디어">${r.idea||''}</div></td>
        <td>
          <div style="display:flex;align-items:flex-start;gap:.3rem">
            <div class="editable" contenteditable="true" data-ph="글감" style="flex:1">${r.writing||''}</div>
            <button class="del-row" title="행 삭제" onclick="this.closest('tr').remove();save()">✕</button>
          </div>
        </td>`;
      tbody.insertBefore(tr, addRowTr);
    });
  }

  table.appendChild(tbody);
  refreshMarks();

  // 자동 저장 훅
  tbody.addEventListener('input', debounce(save, 600));
  if (!data) {
    tbody.querySelector('.q-text').focus();
    save();
  }
}

// ── 저장 ─────────────────────────────────────────────────────
function getState() {
  const groups = [];
  document.querySelectorAll('#score-table tbody').forEach(tb => {
    const qEl  = tb.querySelector('.q-text');
    const cBtn = tb.querySelector('.cadence-btn');
    if (!qEl) return;
    const rows = [];
    tb.querySelectorAll('tr:not(.cadence-row):not(.add-row-tr)').forEach(tr => {
      const cells = tr.querySelectorAll('td');
      if (cells.length < 3) return;
      rows.push({
        skill:   cells[1]?.querySelector('.editable')?.innerText.trim()||'',
        idea:    cells[2]?.querySelector('.editable')?.innerText.trim()||'',
        writing: cells[3]?.querySelector('.editable')?.innerText.trim()||'',
      });
    });
    groups.push({
      q:       qEl.innerText.trim(),
      date:    tb.dataset.date || new Date().toISOString().slice(0,10),
      cadence: cBtn ? { key: cBtn.dataset.c,
                        sym: cBtn.querySelector('.sym').textContent,
                        label: cBtn.querySelector('.lbl').textContent.trim() } : CADENCES[0],
      rows,
    });
  });
  return groups;
}

function save() {
  try {
    localStorage.setItem('idea-score', JSON.stringify(getState()));
    const s = document.getElementById('save-status');
    s.textContent = '저장됨 ' + new Date().toLocaleTimeString();
  } catch(e) {}
}

function load(data) {
  // 기존 tbody 제거
  document.querySelectorAll('#score-table tbody').forEach(tb => tb.remove());
  qCount = 0;
  if (data && data.length) data.forEach(d => addQuestion(d));
  else addQuestion();
}

function clearAll() {
  if (!confirm('모두 지울까요?')) return;
  localStorage.removeItem('idea-score');
  load(null);
}

// ── 예시 데이터 ──────────────────────────────────────────────
function loadExample() {
  const ex = [
    { q:'히스토그램 봉우리 = 어트랙터? P≠NP 문제잖아?',
      cadence: { key:'full', sym:'‖', label:'완전종지' },
      rows:[
        { skill:'/ball  /patternfold', idea:'단봉 = 볼록 최적화 = P\n다봉 = 비볼록 최적화 = NP-hard', writing:'자연이 NP-hard를 물리 법칙으로 공짜로 푼다' },
        { skill:'문병로 PDF', idea:'Turing 반응-확산이 다봉 지형 생성', writing:'' },
        { skill:'', idea:'구형균형 ↔ Unfold 양방향 Fold', writing:'' },
      ]},
    { q:'갈루아+칸토어+리만 조합 — 논리·공간·표현의 관계?',
      cadence: { key:'half', sym:'↑', label:'반종지' },
      rows:[

// ── 내보내기 ─────────────────────────────────────────────────
function exportHTML() {
  const clone = document.documentElement.cloneNode(true);
  // 편집 불가 버전으로 변환
  clone.querySelectorAll('[contenteditable]').forEach(el => {
    el.removeAttribute('contenteditable');
  });
  clone.querySelectorAll('.toolbar').forEach(el => el.remove());
  clone.querySelectorAll('.del-row,.del-group,.add-row-btn,.add-row-tr').forEach(el=>el.remove());
  const blob = new Blob(['<!DOCTYPE html>\n'+clone.outerHTML], {type:'text/html'});
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: 'idea-score-' + new Date().toISOString().slice(0,10) + '.html'
  });
  a.click();
}

// 학술 뷰 렌더
function renderAcademicView() {
  const FIELD_COLOR = { '수학':'#eef2ff', '물리':'#eff6ff', '컴퓨터과학':'#f0fdf4', '정보이론':'#fffbeb' };
  const saved = JSON.parse(localStorage.getItem('acad-notes')||'{}');

  const html = `<div class="acad-timeline">${ACADEMIC_SCORE.map((e,i) => {
    const rows = e.rows.map(r => `
      <div class="acad-grid">
        <div class="acad-cell acad-skill"><div class="acad-lbl">도구·스킬</div><div class="acad-val">${escHtml(r.skill)}</div></div>
        <div class="acad-cell acad-idea"><div class="acad-lbl">발견·아이디어</div><div class="acad-val">${escHtml(r.idea)}</div></div>
        <div class="acad-cell acad-writing"><div class="acad-lbl">생산된 용어·글감</div><div class="acad-val">${
          r.writing.split('·').map(t => `<span class="term">${escHtml(t.trim())}</span>`).join(' ')
        }</div></div>
      </div>`).join('');
    const noteKey = `acad-${i}`;
    const noteVal = saved[noteKey] || '';
    return `<div class="acad-entry">
      <div class="acad-dot"></div>
      <div class="acad-era" style="background:${FIELD_COLOR[e.field]||'#f3f4f6'};display:inline-block;padding:.05rem .45rem;border-radius:3px;margin-bottom:.3rem">${e.era} &nbsp;·&nbsp; ${e.field}</div>
      <div class="acad-q">${escHtml(e.q)}</div>
      <div class="acad-segno">${escHtml(e.segno)}</div>
      ${rows}
      <div class="acad-cadence" data-c="${e.cadence.key}">${e.cadence.sym} &nbsp;${escHtml(e.cadence.label)}</div>
      <div class="acad-note-wrap">
        <div class="acad-note-lbl">내 메모 (저장됨)</div>
        <textarea class="acad-note" data-key="${noteKey}" placeholder="이 개념에 대한 내 이해, 연결되는 질문, 참고할 책...">${escHtml(noteVal)}</textarea>
      </div>
    </div>`;
  }).join('')}</div>`;

  const el = document.getElementById('academic-view');
  el.innerHTML = html;
  el.querySelectorAll('.acad-note').forEach(ta => {
    ta.addEventListener('input', debounce(() => {
      const notes = JSON.parse(localStorage.getItem('acad-notes')||'{}');
      notes[ta.dataset.key] = ta.value;
      localStorage.setItem('acad-notes', JSON.stringify(notes));
    }, 600));
  });
}

// ── 뷰 전환 (악보 ↔ 날짜별 ↔ 학술) ──────────────────────────
function setView(v) {
  const modes = { score: false, cal: false, acad: false };
  modes[v] = true;
  document.body.classList.toggle('cal-mode', modes.cal || modes.acad);
  document.getElementById('score-table').style.display = (modes.cal || modes.acad) ? 'none' : '';
  document.getElementById('add-q-btn').style.display  = (modes.cal || modes.acad) ? 'none' : '';
  document.getElementById('cal-view').style.display       = modes.cal  ? 'block' : 'none';
  document.getElementById('academic-view').style.display  = modes.acad ? 'block' : 'none';
  ['score','cal','acad'].forEach(id => {
    document.getElementById('btn-'+id)?.classList.toggle('active', modes[id]);
  });
  if (modes.cal)  renderCalView();
  if (modes.acad) renderAcademicView();
}

function renderCalView() {
  const marks = [...document.querySelectorAll('.rehearsal')].map(r => r.textContent);
  const byDate = {};
  document.querySelectorAll('#score-table tbody').forEach((tb, i) => {
    const date = tb.dataset.date || new Date().toISOString().slice(0,10);
    const qEl  = tb.querySelector('.q-text');
    const cBtn = tb.querySelector('.cadence-btn');
    if (!byDate[date]) byDate[date] = [];
    byDate[date].push({
      mark: marks[i] || String.fromCharCode(65 + i),
      q:    qEl?.innerText.trim() || '',
      key:  cBtn?.dataset.c || 'open',
      sym:  cBtn?.querySelector('.sym').textContent || '→',
    });
  });

  const sorted = Object.keys(byDate).sort().reverse();
  const calEl  = document.getElementById('cal-view');
  calEl.innerHTML = sorted.length ? sorted.map(date => {
    const entries = byDate[date];
    const label   = new Date(date + 'T00:00:00').toLocaleDateString('ko-KR',
      { year:'numeric', month:'long', day:'numeric', weekday:'short' });
    return `<div class="cal-day">
      <div class="cal-day-header">
        <time datetime="${date}">${label}</time>
        <span class="day-count">— ${entries.length}개 질문</span>
      </div>
      ${entries.map(e => `<div class="cal-entry">
        <span class="cal-mark">${e.mark}</span>
        <span class="cal-q">${escHtml(e.q) || '<em style="opacity:.4">질문 없음</em>'}</span>
        <span class="cal-sym" data-c="${e.key}">${e.sym}</span>
      </div>`).join('')}
    </div>`;
  }).join('') : '<p style="color:#9ca3af;font-size:.82rem">질문이 없습니다.</p>';
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function debounce(fn, ms) {
  let t; return (...args) => { clearTimeout(t); t = setTimeout(()=>fn(...args), ms); };
}

// ── 초기화 ───────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('idea-score');
  if (saved) {
    try { load(JSON.parse(saved)); return; } catch(e) {}
  }
  // 비어있는 상태로 시작
  addQuestion();
});
